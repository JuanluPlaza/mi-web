<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#F9D815">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <title>404 — Página no encontrada · PlazaSys</title>
    <!-- Tipografías autoalojadas: antes venían de fonts.googleapis.com, lo que mandaba la IP de cada
         visitante a Google (sin declararlo en la política de privacidad) y bloqueaba el primer pintado. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/instrument-sans-latin.woff2" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="/fonts/ibm-plex-mono-400-latin.woff2" crossorigin>
    <style>
        /* Fuentes propias (SIL Open Font License 1.1, ver fonts/LICENSE.md). Subconjuntos latin y
           latin-ext, que es lo único que necesita un sitio en español. Instrument Sans es variable:
           un solo archivo cubre de 400 a 700. */
        @font-face{font-family:'Instrument Sans';font-style:normal;font-weight:400 700;font-stretch:100%;font-display:swap;src:url(/fonts/instrument-sans-latin.woff2) format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
        @font-face{font-family:'Instrument Sans';font-style:normal;font-weight:400 700;font-stretch:100%;font-display:swap;src:url(/fonts/instrument-sans-latin-ext.woff2) format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}
        @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/ibm-plex-mono-400-latin.woff2) format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
        @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/ibm-plex-mono-400-latin-ext.woff2) format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}
        @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:500;font-display:swap;src:url(/fonts/ibm-plex-mono-500-latin.woff2) format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
        @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:500;font-display:swap;src:url(/fonts/ibm-plex-mono-500-latin-ext.woff2) format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}
        :root{
            --white:#FAFAF7;--yellow:#F9D815;
            --charcoal:#3E3E3D;--ink:#1C1C1A;--ink2:#4A4A48;--ink3:#6D6D6A;
            --font:'Instrument Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
            --ease:cubic-bezier(.16,1,.3,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:var(--font);color:var(--ink);
            min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;
            /* Una sola declaración: el degradado y el color de fondo juntos. Separados, este
               'background' reseteaba a transparente el 'background:var(--white)' anterior y la
               página se pintaba sobre blanco puro en vez de sobre el crema del resto del sitio. */
            background:radial-gradient(900px 320px at 50% 0%,rgba(249,216,21,.13),transparent 62%) var(--white);
            -webkit-font-smoothing:antialiased;
        }
        body::before{content:'';position:fixed;top:0;left:0;right:0;height:3px;background:var(--yellow);z-index:200}
        .box{max-width:520px}
        .code{font-family:var(--mono);font-size:.7rem;letter-spacing:1px;color:var(--ink3);text-transform:uppercase;margin-bottom:1rem}
        h1{font-size:clamp(4rem,12vw,7rem);font-weight:700;letter-spacing:-2px;line-height:1;position:relative;display:inline-block}
        h1::after{content:'';position:absolute;left:-4px;right:-4px;bottom:8px;height:14px;background:var(--yellow);opacity:.45;z-index:-1;border-radius:2px}
        p{color:var(--ink2);font-size:1.05rem;line-height:1.7;margin:1.2rem 0 2rem}
        .btn{
            display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:.88rem;
            padding:12px 22px;border-radius:8px;background:var(--charcoal);color:#fff;text-decoration:none;
            transition:.25s var(--ease);
        }
        .btn:hover{background:var(--ink);transform:translateY(-1px);box-shadow:0 4px 16px rgba(28,28,26,.15)}

        /* Foco visible por teclado */
        .btn:focus-visible{outline:2px solid var(--yellow);outline-offset:2px}

        /* Movimiento reducido (WCAG 2.2.2): el diseño queda pintado, pero quieto */
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <div class="box">
        <div class="code">Error 404</div>
        <h1>404</h1>
        <p>¡Ups! La página que buscas no existe o se ha movido.<br>No te preocupes, te llevamos de vuelta al inicio.</p>
        <a href="/" class="btn">← Volver al inicio</a>
    </div>
</body>
</html>
